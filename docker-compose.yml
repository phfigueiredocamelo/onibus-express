services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onibus_express
      POSTGRES_USER: onibus
      POSTGRES_PASSWORD: onibus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onibus -d onibus_express"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=onibus_express;Username=onibus;Password=onibus
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
